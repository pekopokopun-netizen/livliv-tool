  <title>リブリー一覧</title>
  <script>
    window.LIVLIV_UPDATE_NUMBER = "2026.07.04-18";
    window.lockLivlivViewportZoom = function () {
      if (window.__livlivViewportZoomLocked) {
        return;
      }

      window.__livlivViewportZoomLocked = true;

      var viewportContent = "width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content";
      var viewportMeta = document.querySelector('meta[name="viewport"]');

      if (viewportMeta) {
        viewportMeta.setAttribute("content", viewportContent);
      }

      var prevent = function (event) {
        if (event.cancelable) {
          event.preventDefault();
        }
      };

      var addLock = function (target, eventName, handler) {
        if (!target) {
          return;
        }

        target.addEventListener(eventName, handler, { passive: false, capture: true });
      };

      ["gesturestart", "gesturechange", "gestureend"].forEach(function (eventName) {
        addLock(window, eventName, prevent);
        addLock(document, eventName, prevent);
      });

      addLock(document, "touchmove", function (event) {
        if ((event.touches && event.touches.length > 1) || event.scale !== 1) {
          prevent(event);
        }
      });

      var lastTouchEnd = 0;
      addLock(document, "touchend", function (event) {
        var now = Date.now();

        if (now - lastTouchEnd <= 350) {
          prevent(event);
        }

        lastTouchEnd = now;
      });
    };

    window.lockLivlivViewportZoom();
  </script>
