<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リブリー一覧</title>
    <link rel="stylesheet" href="style.css?v=20260703-no-export">
</head>
<body class="list-page single-page-site">
  <!-- deploy check -->

  <div class="loading-screen" aria-label="読み込み中">
    <div class="loading-orbit">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <p>読み込み中</p>
  </div>

  <main class="app list-app site-app" id="siteApp">
    <div class="page-title-row">
      <h1 id="pageTitle">リブリー一覧</h1>
    </div>

    <section class="card list-toolbar" id="editToolbar" hidden>
      <button type="button" class="add-new-button" id="addNewButton">新しいリブリーを追加</button>
    </section>

    <section id="contentArea" aria-live="polite"></section>
  </main>

  <section class="modal-backdrop" id="itemModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button type="button" class="modal-close-button" id="modalCloseButton" aria-label="閉じる">×</button>
      <h2 id="modalTitle">リブリーを編集</h2>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button type="button" id="modalSaveButton">保存</button>
        <button type="button" class="danger-button" id="modalDeleteButton">削除</button>
        <button type="button" class="plain-button" id="modalCancelButton">閉じる</button>
      </div>
    </div>
  </section>

  <button class="floating-menu-button" id="menuButton" aria-label="メニュー">•••</button>
  <nav class="floating-menu" id="floatingMenu" aria-label="メニュー">
    <button type="button" data-route="livlies">リブリー一覧</button>
    <button type="button" data-route="personalities">個性一覧</button>
    <button type="button" data-route="materials">素材一覧</button>
    <button type="button" data-route="personalityProbability">個性確率計算</button>
    <button type="button" data-route="dd">dd排出量計算</button>
    <button type="button" data-route="exp">経験値計算</button>
    <button type="button" class="menu-edit-mode-button" id="editModeButton" aria-pressed="false">
      <span class="edit-status-light" aria-hidden="true"></span>
      <span class="edit-status-text">編集 OFF</span>
    </button>
  </nav>

  <script src="data.js"></script>
    <script src="list-mode.js?v=20260703-no-export"></script>
</body>
</html>
